name: P1 Required

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  release:
    types: [published, edited, deleted]
  schedule:
    - cron: "17 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: p1-required-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  required:
    name: P1 Required
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository and historical tags
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - name: Enforce repository governance
        env:
          MPYR_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          MPYR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bash .github/scripts/p1-governance.sh
      - name: Verify historical compatibility feed
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python .github/scripts/verify-historical-release.py
